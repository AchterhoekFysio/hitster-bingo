<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Hitster Bingo • Achterhoek Fysio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
<style>
  :root {
    --dark: #1a1a1a;
    --dark2: #262626;
    --red: #E63946;
    --red-dark: #b82a36;
    --gold: #F4B860;
    --cream: #F8F4E3;
    --white: #ffffff;
    --grey: #999;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    font-weight: 700;
  }
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: clamp(28px, 8vw, 48px);
    color: var(--gold);
    letter-spacing: 2px;
    font-weight: 900;
    line-height: 0.95;
  }
  .header .sub {
    font-size: 12px;
    color: var(--grey);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .mode-link {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-size: 11px;
    color: var(--grey);
    text-decoration: none;
    opacity: 0.5;
    z-index: 100;
  }
  .mode-link:hover { opacity: 1; }

  /* ============ PLAYER MODE ============ */
  .player-name-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    gap: 20px;
  }
  .player-name-screen input {
    font-size: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid var(--gold);
    background: var(--dark2);
    color: var(--cream);
    width: 100%;
    max-width: 300px;
    text-align: center;
    font-family: inherit;
  }
  .player-name-screen button {
    background: var(--red);
    color: var(--white);
    font-size: 18px;
    padding: 16px 32px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .player-name-screen .skip {
    background: transparent;
    color: var(--grey);
    font-size: 13px;
    text-decoration: underline;
    padding: 4px;
  }
  .player-greeting {
    text-align: center;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .card {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    aspect-ratio: 1;
  }
  .cell {
    background: var(--cream);
    color: var(--dark);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    font-size: clamp(10px, 2.4vw, 14px);
    padding: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    line-height: 1.1;
    min-height: 0;
  }
  .cell.marked {
    background: var(--red);
    color: var(--white);
    transform: scale(0.95);
  }
  .cell.marked::after {
    content: "✓";
    position: absolute;
    font-size: 200%;
    color: rgba(255,255,255,0.25);
    font-weight: 900;
    pointer-events: none;
  }
  .cell.free {
    background: var(--gold);
    color: var(--dark);
    font-size: clamp(9px, 1.8vw, 12px);
  }
  .cell.free::before {
    content: "★ ";
  }

  .footer {
    margin-top: 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .footer .progress {
    font-size: 12px;
    color: var(--grey);
  }
  .footer button {
    background: var(--dark2);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid var(--grey);
  }

  /* Bingo overlay */
  .bingo-overlay {
    position: fixed;
    inset: 0;
    background: rgba(230, 57, 70, 0.97);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }
  .bingo-overlay.show { display: flex; }
  .bingo-overlay h1 {
    font-size: clamp(72px, 25vw, 200px);
    color: var(--gold);
    font-weight: 900;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: bingoBounce 0.6s ease;
  }
  .bingo-overlay p {
    color: var(--white);
    font-size: 18px;
    margin: 12px 0 24px;
    text-align: center;
    max-width: 80%;
  }
  .bingo-overlay button {
    background: var(--dark);
    color: var(--gold);
    padding: 14px 28px;
    border-radius: 10px;
    border: 2px solid var(--gold);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  @keyframes bingoBounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ============ HOST MODE ============ */
  .host-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }
  .host-controls-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .round-counter {
    font-size: clamp(14px, 2vw, 18px);
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 2px;
  }
  .qr-toggle {
    background: var(--gold);
    color: var(--dark);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .host-panel {
    background: var(--dark2);
    border-radius: 16px;
    padding: clamp(20px, 4vw, 40px);
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-left: 6px solid var(--red);
    margin-bottom: 16px;
  }
  .host-panel .label {
    font-size: 13px;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .host-panel .anekdote {
    font-size: clamp(20px, 3.2vw, 32px);
    color: var(--cream);
    line-height: 1.45;
    font-weight: 400;
  }
  .host-panel .reveal-name {
    font-size: clamp(36px, 7vw, 80px);
    color: var(--gold);
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
    margin: 16px 0;
  }
  .host-panel .reveal-role {
    font-size: 16px;
    color: var(--grey);
    font-style: italic;
    margin-bottom: 24px;
  }
  .host-panel .song-box {
    background: var(--dark);
    border-radius: 10px;
    padding: 16px 20px;
    margin-top: 12px;
  }
  .host-panel .song-label {
    color: var(--gold);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .host-panel .song-title {
    color: var(--white);
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 700;
  }
  .host-panel .song-artist {
    color: var(--cream);
    font-size: 14px;
    font-style: italic;
    opacity: 0.85;
  }
  .spotify-mount {
    position: absolute;
    visibility: hidden;
    pointer-events: none;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
  .spotify-hidden-wrap {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 100%;
    height: 80px;
    overflow: hidden;
    top: 0;
    left: 0;
    z-index: -1;
  }
  .spotify-hidden-wrap iframe {
    opacity: 0 !important;
    pointer-events: none !important;
    border: 0 !important;
  }
  .spotify-control {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .spotify-play-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #1DB954;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, background 0.15s;
  }
  .spotify-play-btn:hover { background: #1ed760; transform: scale(1.03); }
  .spotify-play-btn:active { transform: scale(0.97); }
  .spotify-play-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .spotify-hint { color: var(--grey); font-size: 12px; font-style: italic; }
  .now-playing {
    display: none;
    align-items: center;
    gap: 8px;
    color: #1DB954;
    font-weight: 700;
    font-size: 14px;
    margin-left: 6px;
  }
  .now-playing.active { display: inline-flex; }
  .now-playing .np-icon {
    display: inline-block;
    width: 12px;
    height: 12px;
    background: #1DB954;
    border-radius: 50%;
    animation: np-pulse 1s infinite ease-in-out;
  }
  @keyframes np-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  .nav-buttons {
    display: flex;
    gap: 12px;
    margin-top: auto;
    flex-wrap: wrap;
  }
  .nav-buttons button {
    flex: 1;
    min-width: 120px;
    padding: 16px;
    border-radius: 10px;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-prev {
    background: var(--dark2);
    color: var(--cream);
    border: 1px solid var(--grey);
  }
  .btn-next {
    background: var(--red);
    color: var(--white);
  }
  .btn-reveal {
    background: var(--gold);
    color: var(--dark);
  }

  /* QR Overlay */
  .qr-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    padding: 20px;
  }
  .qr-overlay.show { display: flex; }
  .qr-overlay h2 {
    color: var(--gold);
    font-size: clamp(20px, 4vw, 32px);
    margin-bottom: 8px;
    text-align: center;
  }
  .qr-overlay p {
    color: var(--cream);
    text-align: center;
    margin-bottom: 24px;
    max-width: 500px;
  }
  .qr-box {
    background: var(--white);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .qr-url {
    color: var(--cream);
    background: var(--dark2);
    padding: 10px 16px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    word-break: break-all;
    max-width: 500px;
    text-align: center;
    margin-bottom: 16px;
  }
  .qr-close {
    background: var(--red);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* End screen */
  .end-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .end-screen h2 {
    font-size: clamp(28px, 6vw, 56px);
    color: var(--gold);
    margin-bottom: 20px;
  }
  .end-screen p {
    color: var(--cream);
    font-size: 18px;
    margin-bottom: 30px;
  }
  .end-screen button {
    background: var(--red);
    color: var(--white);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Mode selector op welkom-scherm */
  .mode-selector { display: flex; gap: 10px; width: 100%; max-width: 340px; }
  .mode-option { flex: 1; cursor: pointer; }
  .mode-option input[type="radio"] { display: none; }
  .mode-card { background: var(--dark2); border: 2px solid var(--grey); border-radius: 10px; padding: 12px 8px; text-align: center; transition: all 0.15s; }
  .mode-option input[type="radio"]:checked + .mode-card { border-color: var(--gold); background: var(--dark); box-shadow: 0 0 0 2px rgba(244, 184, 96, 0.2); }
  .mode-card-title { font-size: 14px; font-weight: 700; color: var(--cream); letter-spacing: 0.5px; }
  .mode-card-sub { font-size: 11px; color: var(--grey); margin-top: 3px; line-height: 1.3; }
  /* Song cells (dubbel-modus) */
  .cell.song { background: #fdebd0; font-style: italic; font-size: clamp(8px, 1.9vw, 11px); }
  .cell.song::before { content: "♫ "; font-style: normal; color: #1DB954; }
  .cell.song.marked { background: var(--red); font-style: normal; }
  .cell.song.marked::before { color: var(--gold); }
  /* Pattern badges */
  .patterns { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 4px; min-height: 20px; }
  .pattern-badge { background: var(--gold); color: var(--dark); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  .pattern-pending { color: var(--grey); font-size: 11px; font-style: italic; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    body { padding: 8px; }
    .header { margin-bottom: 8px; }
    .cell { font-size: 11px; padding: 2px; }
    .cell.song { font-size: 9px; }
    .host-panel { padding: 16px; min-height: 40vh; }
  }

  .anekdote-anim {
    animation: slideInFromRight 0.55s cubic-bezier(.16,.78,.36,1.18);
  }
  @keyframes slideInFromRight {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .anekdote-placeholder {
    font-style: italic;
    color: var(--grey);
    font-size: 18px;
    padding: 20px 0;
    text-align: center;
  }
  .two-cards-wrap {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 12px 0;
  }
  .card-section { display: flex; flex-direction: column; gap: 8px; }
  .card-section-title {
    color: var(--coral);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 0 4px;
  }

  .bingo-grid-twee {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
  }
  .cell-twee {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 10px;
    padding: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--cream);
    cursor: pointer;
    line-height: 1.15;
    transition: all 0.15s;
    font-weight: 600;
    user-select: none;
    overflow: hidden;
    word-break: break-word;
  }
  .cell-twee:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }
  .cell-twee.marked { background: var(--coral); color: white; }
  .cell-twee.free { background: var(--gold); color: #222; font-size: 22px; cursor: default; }
  .player-greeting { text-align: center; padding: 12px 0; color: var(--cream); font-size: 16px; }
</style>
</head>

const NAMES = COLLEAGUES.map(c => c.first);

// ============== UTILS ==============
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function generateCardSquares(seed, mode) {
  const rng = mulberry32(seed);
  if (mode === 'twee') {
    const songs = COLLEAGUES.map(c => ({ type: 'lied', text: c.artiest + ' — ' + c.lied, match: 'lied:' + c.lied }));
    const names = COLLEAGUES.map(c => ({ type: 'naam', text: c.first, match: 'naam:' + c.first }));
    for (let i = songs.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [songs[i], songs[j]] = [songs[j], songs[i]]; }
    for (let i = names.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [names[i], names[j]] = [names[j], names[i]]; }
    const songsCard = songs.slice();
    const namesCard = names.slice();
    for (let i = 0; i < 4; i++) songsCard.push(songs[Math.floor(rng() * songs.length)]);
    for (let i = 0; i < 4; i++) namesCard.push(names[Math.floor(rng() * names.length)]);
    return songsCard.concat(namesCard);
  }
  if (mode === 'dubbel') {
    const pool = [];
    COLLEAGUES.forEach(c => {
      pool.push({ type: 'naam', text: c.first, match: 'naam:' + c.first });
      pool.push({ type: 'lied', text: c.lied, match: 'lied:' + c.lied });
    });
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 24);
  }
  const names = NAMES.slice();
  for (let i = names.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [names[i], names[j]] = [names[j], names[i]];
  }
  const extras = [];
  for (let i = 0; i < 4; i++) {
    extras.push(NAMES[Math.floor(rng() * NAMES.length)]);
  }
  const all = [...names, ...extras];
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.map(name => ({ type: 'naam', text: name, match: 'naam:' + name }));
}

function buildCellGrid(squares) {
  const cells = [];
  let idx = 0;
  for (let r = 0; r < 5; r++) {
    const row = [];
    for (let c = 0; c < 5; c++) {
      if (r === 2 && c === 2) {
        row.push({ isFree: true, type: null, text: 'FREE', match: 'free' });
      } else {
        row.push({ ...squares[idx++], isFree: false });
      }
    }
    cells.push(row);
  }
  return cells;
}

const PATTERN_LABELS = {
  diagonal:   { title: 'DIAGONAAL!',   sub: '5 op een schuine lijn' },
  horizontal: { title: 'HORIZONTAAL!', sub: '5 op een horizontale rij' },
  vertical:   { title: 'VERTICAAL!',   sub: '5 op een verticale lijn' },
  full:       { title: 'VOLLE KAART!', sub: 'Alle 25 vakjes vol — JACKPOT!' },
};
const PATTERN_ORDER = ['diagonal', 'horizontal', 'vertical', 'full'];

function checkPatterns(marked) {
  const m = marked.map(r => r.slice());
  m[2][2] = true;
  const found = new Set();
  if ([0,1,2,3,4].every(i => m[i][i]) || [0,1,2,3,4].every(i => m[i][4-i])) found.add('diagonal');
  for (let r = 0; r < 5; r++) { if (m[r].every(x => x)) { found.add('horizontal'); break; } }
  for (let c = 0; c < 5; c++) { if ([0,1,2,3,4].every(r => m[r][c])) { found.add('vertical'); break; } }
  if (m.every(row => row.every(x => x))) found.add('full');
  return found;
}

function initSpotifyController(uri) {
  if (!spotifyAPI) { pendingTrackUri = uri; return; }
  if (spotifyController) {
    spotifyController.loadUri(uri);
    spotifyPlayingState = false;
    const np = document.getElementById("now-playing");
    if (np) np.classList.remove("active");
    return;
  }
  const element = document.getElementById("spotify-mount");
  if (!element) return;
  {
    spotifyAPI.createController(element, { uri: uri, width: "100%", height: "80" }, (EmbedController) => {
      spotifyController = EmbedController;
      EmbedController.addListener("playback_update", (e) => {
        const np = document.getElementById("now-playing");
        if (!np) return;
        if (e.data && e.data.isPaused) np.classList.remove("active");
        else np.classList.add("active");
      });
    });
  }
}

let spotifyPlayingState = false;
function spotifyToggle() {
  if (!spotifyController) return;
  spotifyController.togglePlay();
  spotifyPlayingState = !spotifyPlayingState;
  const np = document.getElementById("now-playing");
  if (np) np.classList.toggle("active", spotifyPlayingState);
}
function spotifyPause() {
  if (spotifyController) spotifyController.pause();
  spotifyPlayingState = false;

}

function renderTwoCardsView() {
  const app = document.getElementById('app');
  const playerName = localStorage.getItem('bingo_name') || 'Speler';
  const seed = parseInt(localStorage.getItem('bingo_seed')) || Date.now();
  const squares = generateCardSquares(seed, 'twee');
  let marked = JSON.parse(localStorage.getItem('bingo_marked_twee') || '[]');
  if (marked.length !== 48) {
    marked = new Array(48).fill(false);
    localStorage.setItem('bingo_marked_twee', JSON.stringify(marked));
  }
  const buildHalf = (offset) => {
    let h = '<div class="bingo-grid-twee">';
    for (let pos = 0; pos < 25; pos++) {
      if (pos === 12) {
        h += '<div class="cell-twee free">★</div>';
      } else {
        const idx = (pos < 12 ? pos : pos - 1) + offset;
        const sq = squares[idx];
        const isM = marked[idx] ? 'marked' : '';
        h += '<div class="cell-twee ' + isM + '" onclick="toggleTweeCell(' + idx + ')">' + escapeHtml(sq.text) + '</div>';
      }
    }
    h += '</div>';
    return h;
  };
  app.innerHTML = '<div class="header"><h1>HITSTER<br>BINGO</h1><div class="sub">Achterhoek Fysio</div></div>' +
    '<div class="player-greeting">Hoi <strong>' + escapeHtml(playerName) + '</strong>!</div>' +

    '<div class="card-section"><div class="card-section-title">👥 COLLEGAS</div>' + buildHalf(24) + '</div>' +
    '</div>' +
    '<div class="footer"><button onclick="resetTweeCard()">⟲ Reset kaart</button></div>';
}

function toggleTweeCell(idx) {
  let marked = JSON.parse(localStorage.getItem('bingo_marked_twee') || '[]');
  if (marked.length !== 48) marked = new Array(48).fill(false);
  marked[idx] = !marked[idx];
  localStorage.setItem('bingo_marked_twee', JSON.stringify(marked));
  renderTwoCardsView();
  checkTweeBingo();
}

function checkTweeBingo() {
  let marked = JSON.parse(localStorage.getItem('bingo_marked_twee') || '[]');
  if (marked.length !== 48) return;
  const checkHalf = (offset) => {
    const grid = [];
    for (let r = 0; r < 5; r++) {
      const row = [];
      for (let c = 0; c < 5; c++) {
        const pos = r * 5 + c;
        if (pos === 12) row.push(true);
        else row.push(!!marked[(pos < 12 ? pos : pos - 1) + offset]);
      }
      grid.push(row);
    }
    const p = { diagonaal: false, horizontaal: false, verticaal: false, vol: false };
    if (grid[0][0]&&grid[1][1]&&grid[2][2]&&grid[3][3]&&grid[4][4]) p.diagonaal = true;
    if (grid[0][4]&&grid[1][3]&&grid[2][2]&&grid[3][1]&&grid[4][0]) p.diagonaal = true;
    for (let r = 0; r < 5; r++) if (grid[r].every(x => x)) p.horizontaal = true;
    for (let c = 0; c < 5; c++) if ([0,1,2,3,4].every(r => grid[r][c])) p.verticaal = true;
    if (grid.every(row => row.every(x => x))) p.vol = true;
    return p;
  };
  const top = checkHalf(0);
  const bot = checkHalf(24);
  let achieved = JSON.parse(localStorage.getItem('bingo_achieved_twee') || '[]');
  const all = [
    { k: 'n-diag', v: top.diagonaal, l: '🎵 Diagonaal op nummers!' },
    { k: 'n-horz', v: top.horizontaal, l: '🎵 Horizontale rij op nummers!' },
    { k: 'n-vert', v: top.verticaal, l: '🎵 Verticale rij op nummers!' },
    { k: 'n-vol', v: top.vol, l: '🎵 VOLLE NUMMER-KAART! 🏆' },
    { k: 'c-diag', v: bot.diagonaal, l: '👥 Diagonaal op collega’s!' },
    { k: 'c-horz', v: bot.horizontaal, l: '👥 Horizontale rij op collega’s!' },
    { k: 'c-vert', v: bot.verticaal, l: '👥 Verticale rij op collega’s!' },
    { k: 'c-vol', v: bot.vol, l: '👥 VOLLE NAMEN-KAART! 🏆' }
  ];
  for (const p of all) {
    if (p.v && !achieved.includes(p.k)) {
      achieved.push(p.k);
      try { showBingoOverlay(p.l); } catch (e) { alert(p.l); }
    }
  }
  localStorage.setItem('bingo_achieved_twee', JSON.stringify(achieved));
}

function resetTweeCard() {
  if (!confirm('Reset je kaart? Alle aanvinks worden gewist.')) return;
  localStorage.setItem('bingo_marked_twee', JSON.stringify(new Array(48).fill(false)));
  localStorage.setItem('bingo_achieved_twee', JSON.stringify([]));
  renderTwoCardsView();
}

function toggleCell(r, c, match) {
  let marked = JSON.parse(localStorage.getItem('bingo_marked') || 'null');
  if (!marked) marked = Array(5).fill().map(() => Array(5).fill(false));
  marked[2][2] = true;
  const mode = localStorage.getItem('bingo_mode') || 'namen';
  const seed = parseInt(localStorage.getItem('bingo_seed'));
  const squares = generateCardSquares(seed, mode);
  const grid = buildCellGrid(squares);
  const newState = !marked[r][c];
  for (let rr = 0; rr < 5; rr++) {
    for (let cc = 0; cc < 5; cc++) {
      if (grid[rr][cc].match === match) marked[rr][cc] = newState;
    }
  }
  localStorage.setItem('bingo_marked', JSON.stringify(marked));
  document.querySelectorAll('.cell').forEach(el => {
    if (el.classList.contains('free')) return;
    const rr = +el.dataset.r;
    const cc = +el.dataset.c;
    if (marked[rr][cc]) el.classList.add('marked');
    else el.classList.remove('marked');
  });
  updateProgress();
  if (newState) {
    const patterns = checkPatterns(marked);
    let achieved = JSON.parse(localStorage.getItem('bingo_achieved') || '[]');
    for (const p of PATTERN_ORDER) {
      if (patterns.has(p) && !achieved.includes(p)) {
        achieved.push(p);
        localStorage.setItem('bingo_achieved', JSON.stringify(achieved));
        renderAchievedPatterns(achieved);
        showBingoOverlay(p);
        return;
      }
    }
  }
}

function renderAchievedPatterns(achieved) {
  const el = document.getElementById('patterns');
  if (!el) return;
  if (!achieved || achieved.length === 0) {
    el.innerHTML = '<span class="pattern-pending">Nog geen bingo — speel voor diagonaal!</span>';
  } else {
    el.innerHTML = achieved.map(p => `<span class="pattern-badge">✓ ${PATTERN_LABELS[p].title}</span>`).join('');
  }
}

function updateProgress() {
  const marked = JSON.parse(localStorage.getItem('bingo_marked') || 'null') || [];
  let count = 0;
  marked.forEach(row => row.forEach(v => { if (v) count++; }));
  const el = document.getElementById('progress');
  if (el) el.textContent = `${count} / 25 vakjes gemarkeerd`;
}

function showBingoOverlay(pattern) {
  const label = PATTERN_LABELS[pattern] || { title: 'BINGO!', sub: '' };
  document.getElementById('bingo-title').textContent = label.title;
  document.getElementById('bingo-subtitle').innerHTML = label.sub + '<br><br>Roep nu hard <strong>BINGO!</strong> zodat iedereen het hoort.<br>De host komt controleren.';
  document.getElementById('bingo-overlay').classList.add('show');
}
function closeBingoOverlay() {
  document.getElementById('bingo-overlay').classList.remove('show');
}

function resetCard() {
  if (confirm('Nieuwe kaart? Je voortgang en behaalde lijnen worden gewist.')) {
    localStorage.removeItem('bingo_marked');
    localStorage.removeItem('bingo_achieved');
    const seed = Math.floor(Math.random() * 1000000) + Date.now() % 100000;
    localStorage.setItem('bingo_seed', seed);
    renderPlayerCard();
  }
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

      <div class="host-panel">
        ${hostState.anekdoteShown ? '<div class="label anekdote-anim">Anekdote / Hint</div><div class="anekdote anekdote-anim">' + escapeHtml(c.anekdote) + '</div>' : '<div class="anekdote-placeholder">🤐 Klik op de knop voor de hint</div>'}
        <div class="spotify-control"><button class="spotify-play-btn" onclick="spotifyToggle()"><svg viewBox="0 0 168 168" fill="currentColor"><path d="M83.996.277C37.747.277.253 37.77.253 84.019c0 46.251 37.494 83.741 83.743 83.741 46.254 0 83.744-37.49 83.744-83.741 0-46.246-37.49-83.738-83.745-83.738l.001-.004zm38.404 120.78a5.217 5.217 0 01-7.18 1.73c-19.662-12.01-44.414-14.73-73.564-8.07a5.222 5.222 0 01-6.249-3.93 5.213 5.213 0 013.926-6.25c31.9-7.291 59.263-4.15 81.337 9.34 2.46 1.51 3.24 4.72 1.73 7.18zm10.25-22.805c-1.89 3.075-5.91 4.045-8.98 2.155-22.51-13.839-56.823-17.846-83.448-9.764-3.453 1.043-7.1-.903-8.148-4.35a6.538 6.538 0 014.354-8.143c30.413-9.228 68.222-4.758 94.072 11.127 3.07 1.89 4.04 5.91 2.15 8.976v-.001zm.88-23.744c-3.223-1.914-8.54-2.09-11.618-1.156-.495.15-1.018-.13-1.167-.625-.149-.495.13-1.017.626-1.167 3.532-1.072 9.404-.865 13.115 1.338.445.264.591.838.327 1.282-.264.443-.84.59-1.283.328z"/></svg>Speel het nummer</button><span class="spotify-hint">Klik nog eens om te pauzeren</span><span class="now-playing" id="now-playing"><span class="np-icon"></span>Speelt nu</span></div>
      </div>
    `;
  } else {
    content = `
      <div class="host-panel">
        <div class="label">Dit was…</div>
        <div class="reveal-name">${escapeHtml(c.name.toUpperCase())}</div>
        <div class="reveal-role">${escapeHtml(c.role)}</div>
        <div class="song-box">
          <div class="song-label">♫  Het nummer was</div>
          <div class="song-title">"${escapeHtml(c.lied)}"</div>
          <div class="song-artist">— ${escapeHtml(c.artiest)}</div>
        </div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="host-controls-top">
      <div class="round-counter">RONDE ${hostState.round + 1} / ${total}</div>
      <button class="qr-toggle" onclick="toggleQR()">📱 Toon QR voor spelers</button>
    </div>
    ${content}
    <div class="nav-buttons">
      <button class="btn-prev" onclick="hostPrev()" ${hostState.round === 0 && !hostState.revealed ? 'disabled style="opacity:0.4"' : ''}>← Vorige</button>
      ${!hostState.revealed
        ? (!hostState.anekdoteShown ? `<button class="btn-reveal" onclick="hostNext()">💬 Toon anekdote</button>` : `<button class="btn-reveal" onclick="hostNext()">✨ Onthul de naam</button>`)
        : `<button class="btn-next" onclick="hostNext()">${hostState.round === total - 1 ? '🏆 Afsluiten' : 'Volgende ronde →'}</button>`
      }
    </div>
    <div class="qr-overlay" id="qr-overlay">
      <h2>📱 Scan om mee te spelen</h2>
      <p>Scan deze QR-code met je telefoon. Je krijgt automatisch een unieke bingokaart.</p>
      <div class="qr-box" id="qr-box"></div>
      <div class="qr-url" id="qr-url"></div>
      <button class="qr-close" onclick="toggleQR()">Sluiten</button>
    </div>
  `;
  if (!hostState.revealed) {
    initSpotifyController("spotify:track:" + c.spotifyId);
  } else {
    spotifyPause();
  }
}

function hostNext() {
  if (hostState.ended) return;
  if (!hostState.anekdoteShown) {
    hostState.anekdoteShown = true;
    renderHost();
    return;
  }
  if (!hostState.revealed) {
    hostState.revealed = true;
  } else if (hostState.round < COLLEAGUES.length - 1) {
    hostState.round++;
    hostState.revealed = false;
    hostState.anekdoteShown = false;
  } else {
    hostState.ended = true;
  }
  renderHost();
}

function hostPrev() {
  if (hostState.ended) {
    hostState.ended = false;
    renderHost();
    return;
  }
  if (hostState.revealed) {
    hostState.revealed = false;
  } else if (hostState.round > 0) {
    hostState.round--;
    hostState.revealed = true;
  }
  renderHost();
}

function restartHost() {
  hostState = { round: 0, anekdoteShown: false, revealed: false, ended: false };
  renderHost();
}

function toggleQR() {
  const overlay = document.getElementById('qr-overlay');
  if (!overlay) return;
  if (overlay.classList.contains('show')) {
    overlay.classList.remove('show');
  } else {
    const playerUrl = window.location.origin + window.location.pathname;
    const box = document.getElementById('qr-box');
    const urlEl = document.getElementById('qr-url');
    box.innerHTML = '';
    urlEl.textContent = playerUrl;
    try {
      new QRCode(box, { text: playerUrl, width: 280, height: 280,
        colorDark: '#1a1a1a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
    } catch(e) {
      box.innerHTML = '<div style="color:#1a1a1a;padding:30px;text-align:center;">QR niet beschikbaar.<br>Deel de URL hieronder.</div>';
    }
    overlay.classList.add('show');
  }
}
</script>

</body>
</html>
