<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Hitster Bingo • Achterhoek Fysio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --dark: #1a1a1a;
    --dark2: #262626;
    --red: #E63946;
    --red-dark: #b82a36;
    --gold: #F4B860;
    --cream: #F8F4E3;
    --white: #ffffff;
    --grey: #999;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    font-weight: 700;
  }
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: clamp(28px, 8vw, 48px);
    color: var(--gold);
    letter-spacing: 2px;
    font-weight: 900;
    line-height: 0.95;
  }
  .header .sub {
    font-size: 12px;
    color: var(--grey);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .mode-link {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-size: 11px;
    color: var(--grey);
    text-decoration: none;
    opacity: 0.5;
    z-index: 100;
  }
  .mode-link:hover { opacity: 1; }

  /* ============ PLAYER MODE ============ */
  .player-name-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    gap: 20px;
  }
  .player-name-screen input {
    font-size: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid var(--gold);
    background: var(--dark2);
    color: var(--cream);
    width: 100%;
    max-width: 300px;
    text-align: center;
    font-family: inherit;
  }
  .player-name-screen button {
    background: var(--red);
    color: var(--white);
    font-size: 18px;
    padding: 16px 32px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .player-name-screen .skip {
    background: transparent;
    color: var(--grey);
    font-size: 13px;
    text-decoration: underline;
    padding: 4px;
  }
  .player-greeting {
    text-align: center;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .card {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    aspect-ratio: 1;
  }
  .cell {
    background: var(--cream);
    color: var(--dark);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    font-size: clamp(10px, 2.4vw, 14px);
    padding: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    line-height: 1.1;
    min-height: 0;
  }
  .cell.marked {
    background: var(--red);
    color: var(--white);
    transform: scale(0.95);
  }
  .cell.marked::after {
    content: "✓";
    position: absolute;
    font-size: 200%;
    color: rgba(255,255,255,0.25);
    font-weight: 900;
    pointer-events: none;
  }
  .cell.free {
    background: var(--gold);
    color: var(--dark);
    font-size: clamp(9px, 1.8vw, 12px);
  }
  .cell.free::before {
    content: "★ ";
  }

  .footer {
    margin-top: 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .footer .progress {
    font-size: 12px;
    color: var(--grey);
  }
  .footer button {
    background: var(--dark2);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid var(--grey);
  }

  /* Bingo overlay */
  .bingo-overlay {
    position: fixed;
    inset: 0;
    background: rgba(230, 57, 70, 0.97);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }
  .bingo-overlay.show { display: flex; }
  .bingo-overlay h1 {
    font-size: clamp(72px, 25vw, 200px);
    color: var(--gold);
    font-weight: 900;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: bingoBounce 0.6s ease;
  }
  .bingo-overlay p {
    color: var(--white);
    font-size: 18px;
    margin: 12px 0 24px;
    text-align: center;
    max-width: 80%;
  }
  .bingo-overlay button {
    background: var(--dark);
    color: var(--gold);
    padding: 14px 28px;
    border-radius: 10px;
    border: 2px solid var(--gold);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  @keyframes bingoBounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ============ HOST MODE ============ */
  .host-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }
  .host-controls-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 12px;

  .round-counter {
    font-size: clamp(14px, 2vw, 18px);
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 2px;
  }
  .qr-toggle {
    background: var(--gold);
    color: var(--dark);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .host-panel {
    background: var(--dark2);
    border-radius: 16px;
    padding: clamp(20px, 4vw, 40px);
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-left: 6px solid var(--red);

    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 12px;

    color: var(--cream);
    line-height: 1.45;

  }

    color: var(--gold);
    font-weight: 900;
    letter-spacing: 1px;

    margin: 16px 0;

  .host-panel .reveal-role {
    font-size: 16px;
    color: var(--grey);
    font-style: italic;
    margin-bottom: 24px;
  }
  .host-panel .song-box {
    background: var(--dark);
    border-radius: 10px;
    padding: 16px 20px;
    margin-top: 12px;
  }
  .host-panel .song-label {
    color: var(--gold);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .host-panel .song-title {
    color: var(--white);
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 700;
  }
  .host-panel .song-artist {
    color: var(--cream);
    font-size: 14px;
    font-style: italic;
    opacity: 0.85;
  }
  .spotify-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #1DB954;
    color: var(--white);
    padding: 14px 24px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    margin-top: 16px;
    transition: transform 0.15s;
  }
  .spotify-btn:hover { transform: scale(1.03); }
  .spotify-btn:before {
    content: "▶";
    font-size: 18px;
  }

  .nav-buttons {
    display: flex;
    gap: 12px;
    margin-top: auto;
    flex-wrap: wrap;
  }
  .nav-buttons button {
    flex: 1;
    min-width: 120px;
    padding: 16px;
    border-radius: 10px;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-prev {
    background: var(--dark2);
    color: var(--cream);
    border: 1px solid var(--grey);
  }
  .btn-next {
    background: var(--red);
    color: var(--white);
  }
  .btn-reveal {
    background: var(--gold);
    color: var(--dark);
  }

  /* QR Overlay */
  .qr-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    padding: 20px;
  }
  .qr-overlay.show { display: flex; }
  .qr-overlay h2 {
    color: var(--gold);
    font-size: clamp(20px, 4vw, 32px);
    margin-bottom: 8px;
    text-align: center;
  }
  .qr-overlay p {
    color: var(--cream);
    text-align: center;
    margin-bottom: 24px;
    max-width: 500px;
  }
  .qr-box {
    background: var(--white);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .qr-url {
    color: var(--cream);
    background: var(--dark2);
    padding: 10px 16px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    word-break: break-all;
    max-width: 500px;
    text-align: center;
    margin-bottom: 16px;
  }
  .qr-close {
    background: var(--red);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* End screen */
  .end-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .end-screen h2 {
    font-size: clamp(28px, 6vw, 56px);
    color: var(--gold);
    margin-bottom: 20px;
  }
  .end-screen p {
    color: var(--cream);
    font-size: 18px;
    margin-bottom: 30px;
  }
  .end-screen button {
    background: var(--red);
    color: var(--white);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    body { padding: 8px; }
    .header { margin-bottom: 8px; }
    .cell { font-size: 11px; padding: 2px; }
    .host-panel { padding: 16px; min-height: 40vh; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============== DATA ==============
const COLLEAGUES = [
  { name: "Maxime Jansen", first: "Maxime", role: "Secretaresse",

  { name: "Hieke Westerhof", first: "Hieke", role: "Regulier fysiotherapeut",

  { name: "Simon Vos", first: "Simon", role: "Regulier fysiotherapeut • Schouder specialist i.o.",
    anekdote: "Welke aandoening heeft hij eigenlijk? ADHD? Of is hij gewoon eindeloos enthousiast?",
    lied: "Hyperactive!", artiest: "Robert Palmer" },
  { name: "Chantal Gerritsen", first: "Chantal", role: "Fitcoach • SmartFITT Doetinchem",
    anekdote: "Wat heeft ze écht en wat heeft ze niet? ECHT ADHD — check. Maar nog geen vriend (die stuitert vast nog ergens rond). Qua opruimen: het exacte tegenovergestelde van een eerdere collega.",

  { name: "Dulet Carrelo de Oliveira-Meinen", first: "Dulet", role: "Fitcoach • SmartFITT Doetinchem",

    lied: "Whip It", artiest: "Devo" },

    anekdote: "Lekker ouwehoeren is haar tweede natuur. Maar de kachel… die krijg je bij haar niet meer aan.",

    lied: "Forever Young", artiest: "Alphaville" },
  { name: "Tom Bruins", first: "Tom", role: "Regulier fysiotherapeut • Schouder specialist",
    anekdote: "De schouder-fluisteraar van het team. Lekker laagdrempelig om op te leunen…",
    lied: "Lean On Me", artiest: "Bill Withers" },
  { name: "Maryse Gerrits", first: "Maryse", role: "Fysiotherapeut • GLI-coach",

    lied: "Lose Yourself", artiest: "Eminem" },
  { name: "Linda Overbeek-Arnold", first: "Linda", role: "Regulier fysiotherapeut • Dry Needling",
    anekdote: "Bij haar krijg je gegarandeerd een prik (of twee). De Dry Needling-koningin van de praktijk.",
    lied: "Needles And Pins", artiest: "The Searchers" },
  { name: "Emma Lukassen", first: "Emma", role: "Team Achterhoek Fysio",
    anekdote: "De nieuwste aanwinst van het team — vers in de praktijk en al niet meer weg te denken.",
    lied: "Emma", artiest: "Hot Chocolate" },

const NAMES = COLLEAGUES.map(c => c.first);

// ============== UTILS ==============
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function generateCardSquares(seed) {
  const rng = mulberry32(seed);
  // 20 names + 4 random repeats = 24 squares
  const names = NAMES.slice();
  for (let i = names.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [names[i], names[j]] = [names[j], names[i]];
  }
  const extras = [];
  for (let i = 0; i < 4; i++) {
    extras.push(NAMES[Math.floor(rng() * NAMES.length)]);
  }
  const squares = [...names, ...extras];
  for (let i = squares.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [squares[i], squares[j]] = [squares[j], squares[i]];
  }
  return squares;
}

function buildCellGrid(squares) {
  // 5x5 with center FREE
  const cells = [];
  let idx = 0;
  for (let r = 0; r < 5; r++) {
    const row = [];
    for (let c = 0; c < 5; c++) {
      if (r === 2 && c === 2) {
        row.push({ name: null, isFree: true });
      } else {
        row.push({ name: squares[idx++], isFree: false });
      }
    }
    cells.push(row);
  }
  return cells;
}

function checkBingo(marked) {
  // marked is 5x5 booleans, center always marked
  const m = marked.map(r => r.slice());
  m[2][2] = true;
  for (let r = 0; r < 5; r++) {
    if (m[r].every(x => x)) return true;
  }
  for (let c = 0; c < 5; c++) {
    if ([0,1,2,3,4].every(r => m[r][c])) return true;
  }
  if ([0,1,2,3,4].every(i => m[i][i])) return true;
  if ([0,1,2,3,4].every(i => m[i][4-i])) return true;
  return false;
}

// ============== MODE DETECTION ==============
const urlParams = new URLSearchParams(window.location.search);
const isHost = urlParams.has('host');

if (isHost) initHost();
else initPlayer();

// ============== PLAYER MODE ==============
function initPlayer() {
  const app = document.getElementById('app');
  const playerName = localStorage.getItem('bingo_name');

  if (!playerName) {
    renderPlayerNameInput();
  } else {
    renderPlayerCard();
  }

  // Mode link to switch to host
  const link = document.createElement('a');
  link.href = '?host';
  link.className = 'mode-link';
  link.textContent = 'host-modus';
  document.body.appendChild(link);
}

function renderPlayerNameInput() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <h1>HITSTER<br>BINGO</h1>
      <div class="sub">Achterhoek Fysio</div>
    </div>
    <div class="player-name-screen">
      <div style="text-align:center;color:var(--cream);font-size:16px;line-height:1.5;max-width:300px;">
        Welkom! Vul je naam in zodat je kaart wordt onthouden.
      </div>
      <input type="text" id="name-input" placeholder="Jouw naam" autocomplete="off" maxlength="30">
      <button onclick="savePlayerName()">START</button>
      <button class="skip" onclick="savePlayerName(true)">Skip → speel anoniem</button>
    </div>
  `;
  setTimeout(() => document.getElementById('name-input')?.focus(), 100);
  document.getElementById('name-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') savePlayerName();
  });
}

function savePlayerName(skip) {
  const input = document.getElementById('name-input');
  const name = skip ? 'Speler' : (input?.value.trim() || 'Speler');
  localStorage.setItem('bingo_name', name);
  // Generate unique seed per player
  if (!localStorage.getItem('bingo_seed')) {
    const seed = Math.floor(Math.random() * 1000000) + Date.now() % 100000;
    localStorage.setItem('bingo_seed', seed);
  }
  renderPlayerCard();
}

function renderPlayerCard() {
  const app = document.getElementById('app');
  const name = localStorage.getItem('bingo_name') || 'Speler';
  const seed = parseInt(localStorage.getItem('bingo_seed'));
  const squares = generateCardSquares(seed);
  const grid = buildCellGrid(squares);
  let marked = JSON.parse(localStorage.getItem('bingo_marked') || 'null');
  if (!marked) {
    marked = Array(5).fill().map(() => Array(5).fill(false));
    marked[2][2] = true;
  }

  app.innerHTML = `
    <div class="header">
      <h1>HITSTER BINGO</h1>
      <div class="sub">Achterhoek Fysio</div>
    </div>
    <div class="player-greeting">Hé ${escapeHtml(name)}! 🎵 Tik op een naam om af te vinken.</div>
    <div class="card" id="bingo-card"></div>
    <div class="footer">
      <div class="progress" id="progress"></div>
      <button onclick="resetCard()">🔄 Nieuwe kaart</button>
    </div>
    <div class="bingo-overlay" id="bingo-overlay">
      <h1>BINGO!</h1>
      <p>Roep nu hard <strong>BINGO!</strong> zodat iedereen het hoort.<br>De host komt controleren.</p>
      <button onclick="closeBingoOverlay()">Doorgaan</button>
    </div>
  `;

  const cardEl = document.getElementById('bingo-card');
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      const cell = grid[r][c];
      const div = document.createElement('div');
      div.className = 'cell' + (cell.isFree ? ' free' : '') + (marked[r][c] ? ' marked' : '');
      div.textContent = cell.isFree ? 'FREE' : cell.name;
      div.dataset.r = r;
      div.dataset.c = c;
      div.dataset.name = cell.name || '';
      if (!cell.isFree) {
        div.addEventListener('click', () => toggleCell(r, c, cell.name));
      }
      cardEl.appendChild(div);
    }
  }

  updateProgress();
}

function toggleCell(r, c, name) {
  let marked = JSON.parse(localStorage.getItem('bingo_marked') || 'null');
  if (!marked) {
    marked = Array(5).fill().map(() => Array(5).fill(false));
  }
  marked[2][2] = true;

  // Mark/unmark ALL occurrences of this name (since a name can appear twice)
  const seed = parseInt(localStorage.getItem('bingo_seed'));
  const squares = generateCardSquares(seed);
  const grid = buildCellGrid(squares);

  const currentlyMarked = marked[r][c];
  const newState = !currentlyMarked;

  for (let rr = 0; rr < 5; rr++) {
    for (let cc = 0; cc < 5; cc++) {
      if (grid[rr][cc].name === name) {
        marked[rr][cc] = newState;
      }
    }
  }

  localStorage.setItem('bingo_marked', JSON.stringify(marked));

  // Re-render cells
  document.querySelectorAll('.cell').forEach(el => {
    if (el.classList.contains('free')) return;
    const rr = +el.dataset.r;
    const cc = +el.dataset.c;
    if (marked[rr][cc]) el.classList.add('marked');
    else el.classList.remove('marked');
  });

  updateProgress();

  if (newState && checkBingo(marked)) {
    showBingoOverlay();
  }
}

function updateProgress() {
  const marked = JSON.parse(localStorage.getItem('bingo_marked') || 'null') || [];
  let count = 0;
  marked.forEach(row => row.forEach(v => { if (v) count++; }));
  const el = document.getElementById('progress');
  if (el) el.textContent = `${count} / 25 vakjes gemarkeerd`;
}

function showBingoOverlay() {
  document.getElementById('bingo-overlay').classList.add('show');
}
function closeBingoOverlay() {
  document.getElementById('bingo-overlay').classList.remove('show');
}

function resetCard() {
  if (confirm('Nieuwe kaart? Je huidige voortgang wordt gewist.')) {
    localStorage.removeItem('bingo_marked');
    const seed = Math.floor(Math.random() * 1000000) + Date.now() % 100000;
    localStorage.setItem('bingo_seed', seed);
    renderPlayerCard();
  }
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============== HOST MODE ==============
let hostState = {
  round: 0,        // 0-19
  revealed: false, // shown name yet?
  ended: false,
};

function initHost() {
  renderHost();
  document.addEventListener('keydown', handleHostKeys);

  // Mode link to switch to player
  const link = document.createElement('a');
  link.href = window.location.pathname;
  link.className = 'mode-link';
  link.textContent = 'speler-modus';
  document.body.appendChild(link);
}

function handleHostKeys(e) {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    hostNext();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    hostPrev();
  } else if (e.key.toLowerCase() === 'q') {
    toggleQR();
  }
}

function renderHost() {
  const app = document.getElementById('app');
  if (hostState.ended) {
    app.innerHTML = `
      <div class="end-screen">
        <h2>BEDANKT VOOR HET MEESPELEN!</h2>
        <p>Team Achterhoek Fysio • ♫ Tot de volgende borrel! ♫</p>
        <button onclick="restartHost()">⟲ Speel opnieuw</button>
      </div>
    `;
    return;
  }

  const c = COLLEAGUES[hostState.round];
  const total = COLLEAGUES.length;
  const spotifyUrl = `https://open.spotify.com/search/${encodeURIComponent(c.lied + ' ' + c.artiest)}`;

  let content;
  if (!hostState.revealed) {
    content = `
      <div class="host-panel">
        <div class="label">Anekdote / Hint</div>
        <div class="anekdote">${escapeHtml(c.anekdote)}</div>
        <a href="${spotifyUrl}" target="_blank" class="spotify-btn">
          Open op Spotify — speel het nummer
        </a>
      </div>
    `;
  } else {
    content = `
      <div class="host-panel">
        <div class="label">Dit was…</div>
        <div class="reveal-name">${escapeHtml(c.name.toUpperCase())}</div>
        <div class="reveal-role">${escapeHtml(c.role)}</div>
        <div class="song-box">
          <div class="song-label">♫  Het nummer was</div>
          <div class="song-title">"${escapeHtml(c.lied)}"</div>
          <div class="song-artist">— ${escapeHtml(c.artiest)}</div>
        </div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="host-controls-top">
      <div class="round-counter">RONDE ${hostState.round + 1} / ${total}</div>
      <button class="qr-toggle" onclick="toggleQR()">📱 Toon QR voor spelers</button>
    </div>
    ${content}
    <div class="nav-buttons">
      <button class="btn-prev" onclick="hostPrev()" ${hostState.round === 0 && !hostState.revealed ? 'disabled style="opacity:0.4"' : ''}>← Vorige</button>
      ${!hostState.revealed
        ? `<button class="btn-reveal" onclick="hostNext()">✨ Onthul de naam</button>`
        : `<button class="btn-next" onclick="hostNext()">${hostState.round === total - 1 ? '🏆 Afsluiten' : 'Volgende ronde →'}</button>`
      }
    </div>
    <div class="qr-overlay" id="qr-overlay">
      <h2>📱 Scan om mee te spelen</h2>
      <p>Scan deze QR-code met je telefoon. Je krijgt automatisch een unieke bingokaart.</p>
      <div class="qr-box" id="qr-box"></div>
      <div class="qr-url" id="qr-url"></div>
      <button class="qr-close" onclick="toggleQR()">Sluiten</button>
    </div>
  `;
}

function hostNext() {
  if (hostState.ended) return;
  if (!hostState.revealed) {
    hostState.revealed = true;
  } else if (hostState.round < COLLEAGUES.length - 1) {
    hostState.round++;
    hostState.revealed = false;
  } else {
    hostState.ended = true;
  }
  renderHost();
}

function hostPrev() {
  if (hostState.ended) {
    hostState.ended = false;
    renderHost();
    return;
  }
  if (hostState.revealed) {
    hostState.revealed = false;
  } else if (hostState.round > 0) {
    hostState.round--;
    hostState.revealed = true;
  }
  renderHost();
}

function restartHost() {
  hostState = { round: 0, revealed: false, ended: false };
  renderHost();
}

function toggleQR() {
  const overlay = document.getElementById('qr-overlay');
  if (!overlay) return;
  if (overlay.classList.contains('show')) {
    overlay.classList.remove('show');
  } else {
    const playerUrl = window.location.origin + window.location.pathname;
    const box = document.getElementById('qr-box');
    const urlEl = document.getElementById('qr-url');
    box.innerHTML = '';
    urlEl.textContent = playerUrl;
    try {
      new QRCode(box, { text: playerUrl, width: 280, height: 280,
        colorDark: '#1a1a1a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
    } catch(e) {
      box.innerHTML = '<div style="color:#1a1a1a;padding:30px;text-align:center;">QR niet beschikbaar.<br>Deel de URL hieronder.</div>';
    }
    overlay.classList.add('show');
  }
}
</script>
